<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 430" width="860" height="430">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      .bg{fill:#0d1117}
      .win{fill:#161b22}
      .br{fill:none;stroke:#00ffcc;stroke-width:1.5;opacity:.5}
      .br2{fill:none;stroke:#00ffcc;stroke-width:4;opacity:.1;filter:url(#g)}
      .ttl{font-family:"JetBrains Mono",monospace;font-size:12.5px;font-weight:700;fill:#00ffcc}
      .kw{font-family:"JetBrains Mono",monospace;font-size:12.5px;fill:#ff7b72}
      .fn{font-family:"JetBrains Mono",monospace;font-size:12.5px;fill:#d2a8ff}
      .k{font-family:"JetBrains Mono",monospace;font-size:12.5px;fill:#7ee787}
      .v{font-family:"JetBrains Mono",monospace;font-size:12.5px;fill:#79c0ff}
      .s{font-family:"JetBrains Mono",monospace;font-size:12.5px;fill:#a5d6ff}
      .p{font-family:"JetBrains Mono",monospace;font-size:12.5px;fill:#e6edf3}
      .cm{font-family:"JetBrains Mono",monospace;font-size:12px;fill:#3d444d;font-style:italic}
      .ln{font-family:"JetBrains Mono",monospace;font-size:11px;fill:#3d444d;text-anchor:end}
      .tb{font-family:"JetBrains Mono",monospace;font-size:11px;fill:#8b949e}
      .ta{font-family:"JetBrains Mono",monospace;font-size:11px;fill:#e6edf3}
      .cur{fill:#00ffcc}
      .rd{fill:#f85149} .yw{fill:#e3b341} .gn{fill:#3fb950}
      @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
      @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
      @keyframes pulse{0%,100%{opacity:.3}50%{opacity:.8}}
      .cur{animation:blink 1s step-end infinite}
      .br2{animation:pulse 3s ease-in-out infinite}
    </style>
    <style>
      .r1{animation:fi .3s ease .05s both}.r2{animation:fi .3s ease .12s both}
      .r3{animation:fi .3s ease .19s both}.r4{animation:fi .3s ease .26s both}
      .r5{animation:fi .3s ease .33s both}.r6{animation:fi .3s ease .40s both}
      .r7{animation:fi .3s ease .47s both}.r8{animation:fi .3s ease .54s both}
      .r9{animation:fi .3s ease .61s both}.r10{animation:fi .3s ease .68s both}
      .r11{animation:fi .3s ease .75s both}.r12{animation:fi .3s ease .82s both}
      .r13{animation:fi .3s ease .89s both}.r14{animation:fi .3s ease .96s both}
      .r15{animation:fi .3s ease 1.03s both}.r16{animation:fi .3s ease 1.10s both}
      .r17{animation:fi .3s ease 1.17s both}.r18{animation:fi .3s ease 1.24s both}
      .r19{animation:fi .3s ease 1.31s both}.r20{animation:fi .3s ease 1.38s both}
    </style>
    <filter id="g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- BG + border -->
  <rect width="860" height="430" rx="12" class="bg"/>
  <rect x="1.5" y="1.5" width="857" height="427" rx="11" class="br2"/>
  <rect x="1.5" y="1.5" width="857" height="427" rx="11" class="br"/>

  <!-- Title bar -->
  <rect x="1.5" y="1.5" width="857" height="38" rx="11" class="win"/>
  <rect x="1.5" y="28" width="857" height="12" class="win"/>
  <!-- dots -->
  <circle cx="22" cy="20" r="6" class="rd"/>
  <circle cx="42" cy="20" r="6" class="yw"/>
  <circle cx="62" cy="20" r="6" class="gn"/>
  <!-- tabs -->
  <rect x="86" y="7" width="128" height="24" rx="4" class="bg"/>
  <text x="98" y="23" class="ta">mounir.ts</text>
  <text x="224" y="23" class="tb">  about.md</text>
  <text x="320" y="23" class="tb">  config.json</text>

  <!-- line numbers bg -->
  <rect x="1.5" y="39" width="40" height="389" class="win"/>

  <!-- ── ROW 1 ── -->
  <g class="r1">
    <text x="37" y="67" class="ln">1</text>
    <text x="52" y="67" class="cm">// ──────────────────────────────────────────────────────────</text>
  </g>
  <!-- ── ROW 2 ── -->
  <g class="r2">
    <text x="37" y="85" class="ln">2</text>
    <text x="52" y="85" class="cm">// 👨‍💻  Mounir Amir  ·  Full Stack Developer  ·  Alexandria 🇪🇬</text>
  </g>
  <!-- ── ROW 3 ── -->
  <g class="r3">
    <text x="37" y="103" class="ln">3</text>
    <text x="52" y="103" class="cm">// ──────────────────────────────────────────────────────────</text>
  </g>
  <!-- ── ROW 4 blank ── -->
  <g class="r4"><text x="37" y="121" class="ln">4</text></g>
  <!-- ── ROW 5 ── -->
  <g class="r5">
    <text x="37" y="139" class="ln">5</text>
    <text x="52" y="139" class="kw">const </text><text x="96" y="139" class="fn">mounir</text><text x="148" y="139" class="p">: </text><text x="160" y="139" class="ttl">Developer</text><text x="228" y="139" class="p"> = {</text>
  </g>
  <!-- ── ROW 6 ── -->
  <g class="r6">
    <text x="37" y="157" class="ln">6</text>
    <text x="68" y="157" class="k">name</text><text x="100" y="157" class="p">:      </text><text x="148" y="157" class="s">"Mounir Amir"</text><text x="274" y="157" class="p">,</text>
  </g>
  <!-- ── ROW 7 ── -->
  <g class="r7">
    <text x="37" y="175" class="ln">7</text>
    <text x="68" y="175" class="k">location</text><text x="126" y="175" class="p">:  </text><text x="148" y="175" class="s">"Alexandria, Egypt 🇪🇬"</text><text x="358" y="175" class="p">,</text>
  </g>
  <!-- ── ROW 8 ── -->
  <g class="r8">
    <text x="37" y="193" class="ln">8</text>
    <text x="68" y="193" class="k">role</text><text x="100" y="193" class="p">:      </text><text x="148" y="193" class="s">"Full Stack Developer"</text><text x="352" y="193" class="p">,</text>
  </g>
  <!-- ── ROW 9 ── -->
  <g class="r9">
    <text x="37" y="211" class="ln">9</text>
    <text x="68" y="211" class="k">stack</text><text x="108" y="211" class="p">:     </text>
    <text x="148" y="211" class="p">[</text>
    <text x="155" y="211" class="s">"React"</text><text x="211" y="211" class="p">, </text>
    <text x="223" y="211" class="s">"Next.js"</text><text x="291" y="211" class="p">, </text>
    <text x="303" y="211" class="s">"Node.js"</text><text x="371" y="211" class="p">, </text>
    <text x="383" y="211" class="s">"TypeScript"</text><text x="467" y="211" class="p">],</text>
  </g>
  <!-- ── ROW 10 ── -->
  <g class="r10">
    <text x="37" y="229" class="ln">10</text>
    <text x="68" y="229" class="k">database</text><text x="126" y="229" class="p">:  </text>
    <text x="148" y="229" class="p">[</text>
    <text x="155" y="229" class="s">"MySQL"</text><text x="219" y="229" class="p">, </text>
    <text x="231" y="229" class="s">"MongoDB"</text><text x="307" y="229" class="p">],</text>
  </g>
  <!-- ── ROW 11 ── -->
  <g class="r11">
    <text x="37" y="247" class="ln">11</text>
    <text x="68" y="247" class="k">languages</text><text x="134" y="247" class="p">: </text>
    <text x="148" y="247" class="p">[</text>
    <text x="155" y="247" class="s">"JS"</text><text x="187" y="247" class="p">, </text>
    <text x="199" y="247" class="s">"TS"</text><text x="231" y="247" class="p">, </text>
    <text x="243" y="247" class="s">"C"</text><text x="267" y="247" class="p">, </text>
    <text x="279" y="247" class="s">"Java"</text><text x="319" y="247" class="p">],</text>
  </g>
  <!-- ── ROW 12 ── -->
  <g class="r12">
    <text x="37" y="265" class="ln">12</text>
    <text x="68" y="265" class="k">learning</text><text x="126" y="265" class="p">:  </text><text x="148" y="265" class="s">"System Design &amp; Architecture"</text><text x="436" y="265" class="p">,</text>
  </g>
  <!-- ── ROW 13 ── -->
  <g class="r13">
    <text x="37" y="283" class="ln">13</text>
    <text x="68" y="283" class="k">goal</text><text x="100" y="283" class="p">:      </text><text x="148" y="283" class="s">"Senior Full Stack Developer 🎯"</text><text x="428" y="283" class="p">,</text>
  </g>
  <!-- ── ROW 14 ── -->
  <g class="r14">
    <text x="37" y="301" class="ln">14</text>
    <text x="68" y="301" class="k">projects</text><text x="126" y="301" class="p">:  </text><text x="148" y="301" class="v">15</text><text x="162" y="301" class="p">,</text>
    <text x="178" y="301" class="cm">  // and counting...</text>
  </g>
  <!-- ── ROW 15 ── -->
  <g class="r15">
    <text x="37" y="319" class="ln">15</text>
    <text x="68" y="319" class="k">available</text><text x="134" y="319" class="p">: </text><text x="148" y="319" class="v">true</text><text x="176" y="319" class="p">,</text>
    <text x="192" y="319" class="cm">  // 🟢 open to opportunities!</text>
  </g>
  <!-- ── ROW 16 ── -->
  <g class="r16">
    <text x="37" y="337" class="ln">16</text>
    <text x="68" y="337" class="k">funFact</text><text x="116" y="337" class="p">:   </text><text x="148" y="337" class="s">"I console.log() everything 😅"</text><text x="424" y="337" class="p">,</text>
  </g>
  <!-- ── ROW 17 closing brace ── -->
  <g class="r17">
    <text x="37" y="355" class="ln">17</text>
    <text x="52" y="355" class="p">};</text>
  </g>
  <!-- ── ROW 18 blank ── -->
  <g class="r18"><text x="37" y="373" class="ln">18</text></g>
  <!-- ── ROW 19 comment ── -->
  <g class="r19">
    <text x="37" y="391" class="ln">19</text>
    <text x="52" y="391" class="cm">// ✅  mounir.build() → ready for production</text>
  </g>
  <!-- ── ROW 20 cursor ── -->
  <g class="r20">
    <text x="37" y="412" class="ln">20</text>
    <text x="52" y="412" class="ttl">▶ </text>
    <rect x="68" y="399" width="9" height="17" class="cur" rx="1"/>
  </g>

  <!-- scanline -->
  <rect x="42" y="39" width="818" height="3" fill="#00ffcc" opacity="0.025">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,393" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
