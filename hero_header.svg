<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');

      /* ── Animations ── */
      @keyframes gridMove {
        0%   { transform: translateY(0); }
        100% { transform: translateY(40px); }
      }
      @keyframes pulse {
        0%,100% { opacity: .15; }
        50%      { opacity: .45; }
      }
      @keyframes glow {
        0%,100% { filter: drop-shadow(0 0 8px #00ffcc) drop-shadow(0 0 20px #00ffcc88); }
        50%      { filter: drop-shadow(0 0 18px #00ffcc) drop-shadow(0 0 45px #00ffcccc) drop-shadow(0 0 80px #00ffcc44); }
      }
      @keyframes glowSub {
        0%,100% { opacity: .75; }
        50%      { opacity: 1; filter: drop-shadow(0 0 6px #ffffff88); }
      }
      @keyframes scanMove {
        0%   { transform: translateY(-10px); opacity: .07; }
        100% { transform: translateY(330px); opacity: .07; }
      }
      @keyframes particleFly {
        0%   { transform: translate(0,0);   opacity: 0; }
        10%  { opacity: .8; }
        90%  { opacity: .6; }
        100% { transform: translate(var(--dx),var(--dy)); opacity: 0; }
      }
      @keyframes borderFlow {
        0%   { stroke-dashoffset: 0; }
        100% { stroke-dashoffset: -2800; }
      }
      @keyframes fadeSlideIn {
        from { opacity: 0; transform: translateY(14px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes cursorBlink {
        0%,49% { opacity: 1; } 50%,100% { opacity: 0; }
      }
      @keyframes shimmer {
        0%   { stop-color: #00ffcc; }
        25%  { stop-color: #00d4ff; }
        50%  { stop-color: #7c3aed; }
        75%  { stop-color: #00d4ff; }
        100% { stop-color: #00ffcc; }
      }
      @keyframes shimmer2 {
        0%   { stop-color: #00d4ff; }
        25%  { stop-color: #7c3aed; }
        50%  { stop-color: #00ffcc; }
        75%  { stop-color: #00ffcc; }
        100% { stop-color: #00d4ff; }
      }

      .grid-line { stroke: #00ffcc; stroke-width: .5; opacity: .08; animation: pulse 4s ease-in-out infinite; }
      .grid-anim  { animation: gridMove 3s linear infinite; }
      .main-title { font-family: "Orbitron","JetBrains Mono",monospace; font-size: 74px; font-weight: 900; fill: url(#titleGrad); animation: glow 3s ease-in-out infinite, fadeSlideIn .8s ease .1s both; text-anchor: middle; dominant-baseline: middle; letter-spacing: 6px; }
      .sub-title  { font-family: "JetBrains Mono",monospace; font-size: 19px; font-weight: 700; fill: #e2e8f0; animation: glowSub 3s ease-in-out infinite, fadeSlideIn .8s ease .5s both; text-anchor: middle; dominant-baseline: middle; letter-spacing: 3px; }
      .tag-line   { font-family: "JetBrains Mono",monospace; font-size: 13px; font-weight: 400; fill: #00ffcc; animation: fadeSlideIn .8s ease .9s both; text-anchor: middle; dominant-baseline: middle; letter-spacing: 2px; opacity: .8; }
      .border-path { fill: none; stroke: url(#borderGrad); stroke-width: 2; stroke-dasharray: 12 6; stroke-dashoffset: 0; animation: borderFlow 8s linear infinite; opacity: .7; }
      .border-glow { fill: none; stroke: #00ffcc; stroke-width: 5; opacity: .08; filter: url(#blurF); }
      .scan-line  { fill: #00ffcc; width: 1200; height: 2; animation: scanMove 4s linear infinite; }
      .cursor     { fill: #00ffcc; animation: cursorBlink 1s step-end infinite; }
    </style>

    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#020817"/>
      <stop offset="50%"  stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#020817"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffcc">
        <animate attributeName="stop-color" values="#00ffcc;#00d4ff;#7c3aed;#00d4ff;#00ffcc" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%"  stop-color="#00d4ff">
        <animate attributeName="stop-color" values="#00d4ff;#7c3aed;#00ffcc;#00ffcc;#00d4ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#00ffcc;#00d4ff;#7c3aed;#7c3aed" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity=".9"/>
      <stop offset="50%"  stop-color="#7c3aed" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="glowBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#00ffcc" stop-opacity=".6"/>
      <stop offset="50%"  stop-color="#00ffcc" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#00ffcc" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity=".07"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurF"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="textGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="1200" height="320" rx="0"/></clipPath>
  </defs>

  <!-- ── BG ── -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#centerGlow)"/>

  <!-- ── GRID ── -->
  <g clip-path="url(#clip)">
    <g class="grid-anim">
      <!-- vertical lines -->
      <line x1="0"    y1="-40" x2="0"    y2="360" class="grid-line"/>
      <line x1="80"   y1="-40" x2="80"   y2="360" class="grid-line"/>
      <line x1="160"  y1="-40" x2="160"  y2="360" class="grid-line"/>
      <line x1="240"  y1="-40" x2="240"  y2="360" class="grid-line"/>
      <line x1="320"  y1="-40" x2="320"  y2="360" class="grid-line"/>
      <line x1="400"  y1="-40" x2="400"  y2="360" class="grid-line"/>
      <line x1="480"  y1="-40" x2="480"  y2="360" class="grid-line"/>
      <line x1="560"  y1="-40" x2="560"  y2="360" class="grid-line"/>
      <line x1="640"  y1="-40" x2="640"  y2="360" class="grid-line"/>
      <line x1="720"  y1="-40" x2="720"  y2="360" class="grid-line"/>
      <line x1="800"  y1="-40" x2="800"  y2="360" class="grid-line"/>
      <line x1="880"  y1="-40" x2="880"  y2="360" class="grid-line"/>
      <line x1="960"  y1="-40" x2="960"  y2="360" class="grid-line"/>
      <line x1="1040" y1="-40" x2="1040" y2="360" class="grid-line"/>
      <line x1="1120" y1="-40" x2="1120" y2="360" class="grid-line"/>
      <line x1="1200" y1="-40" x2="1200" y2="360" class="grid-line"/>
      <!-- horizontal lines -->
      <line x1="0" y1="-40"  x2="1200" y2="-40"  class="grid-line"/>
      <line x1="0" y1="0"    x2="1200" y2="0"     class="grid-line"/>
      <line x1="0" y1="40"   x2="1200" y2="40"    class="grid-line"/>
      <line x1="0" y1="80"   x2="1200" y2="80"    class="grid-line"/>
      <line x1="0" y1="120"  x2="1200" y2="120"   class="grid-line"/>
      <line x1="0" y1="160"  x2="1200" y2="160"   class="grid-line"/>
      <line x1="0" y1="200"  x2="1200" y2="200"   class="grid-line"/>
      <line x1="0" y1="240"  x2="1200" y2="240"   class="grid-line"/>
      <line x1="0" y1="280"  x2="1200" y2="280"   class="grid-line"/>
      <line x1="0" y1="320"  x2="1200" y2="320"   class="grid-line"/>
      <line x1="0" y1="360"  x2="1200" y2="360"   class="grid-line"/>
    </g>
  </g>

  <!-- ── CORNER ACCENTS ── -->
  <!-- top-left -->
  <polyline points="0,50 0,0 50,0"    fill="none" stroke="#00ffcc" stroke-width="2.5" opacity=".8"/>
  <!-- top-right -->
  <polyline points="1150,0 1200,0 1200,50"  fill="none" stroke="#00ffcc" stroke-width="2.5" opacity=".8"/>
  <!-- bottom-left -->
  <polyline points="0,270 0,320 50,320"     fill="none" stroke="#7c3aed" stroke-width="2.5" opacity=".8"/>
  <!-- bottom-right -->
  <polyline points="1150,320 1200,320 1200,270" fill="none" stroke="#7c3aed" stroke-width="2.5" opacity=".8"/>

  <!-- ── ANIMATED BORDER ── -->
  <rect x="1" y="1" width="1198" height="318" class="border-glow"/>
  <rect x="1" y="1" width="1198" height="318" class="border-path"/>

  <!-- ── SCAN LINE ── -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#glowBar)" opacity=".5">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,322" dur="3.5s" repeatCount="indefinite"/>
  </rect>

  <!-- ── PARTICLES ── -->
  <circle cx="120" cy="60"  r="2" fill="#00ffcc" opacity="0">
    <animate attributeName="cy" values="60;20;60" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.7;0" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="250" r="1.5" fill="#7c3aed" opacity="0">
    <animate attributeName="cy" values="250;210;250" dur="4s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.8;0" dur="4s" begin="1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="80"  r="2" fill="#00d4ff" opacity="0">
    <animate attributeName="cy" values="80;40;80" dur="6s" begin=".5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.6;0" dur="6s" begin=".5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1050" cy="260" r="1.5" fill="#00ffcc" opacity="0">
    <animate attributeName="cy" values="260;220;260" dur="4.5s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.7;0" dur="4.5s" begin="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="600" cy="30" r="1.5" fill="#7c3aed" opacity="0">
    <animate attributeName="cy" values="30;5;30" dur="5.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.5;0" dur="5.5s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="290" r="2" fill="#00d4ff" opacity="0">
    <animate attributeName="cy" values="290;260;290" dur="3.8s" begin=".8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.6;0" dur="3.8s" begin=".8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1000" cy="160" r="1.5" fill="#00ffcc" opacity="0">
    <animate attributeName="cy" values="160;130;160" dur="5s" begin="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;.5;0" dur="5s" begin="3s" repeatCount="indefinite"/>
  </circle>

  <!-- ── SIDE DECORATIONS ── -->
  <!-- left bar -->
  <rect x="28" y="100" width="3" height="120" fill="url(#borderGrad)" rx="2" opacity=".6">
    <animate attributeName="opacity" values=".6;1;.6" dur="2s" repeatCount="indefinite"/>
  </rect>
  <!-- right bar -->
  <rect x="1169" y="100" width="3" height="120" fill="url(#borderGrad)" rx="2" opacity=".6">
    <animate attributeName="opacity" values=".6;1;.6" dur="2s" begin="1s" repeatCount="indefinite"/>
  </rect>

  <!-- ── DIVIDER LINES ── -->
  <line x1="200" y1="230" x2="560" y2="230" stroke="url(#glowBar)" stroke-width="1" opacity=".4"/>
  <line x1="640" y1="230" x2="1000" y2="230" stroke="url(#glowBar)" stroke-width="1" opacity=".4"/>

  <!-- ── DIAMOND CENTER ── -->
  <polygon points="600,220 610,230 600,240 590,230" fill="none" stroke="#00ffcc" stroke-width="1.5" opacity=".7">
    <animate attributeName="opacity" values=".7;1;.7" dur="2s" repeatCount="indefinite"/>
  </polygon>

  <!-- ── TEXT ── -->
  <!-- Shadow/glow layer -->
  <text x="600" y="138" class="main-title" filter="url(#textGlow)" opacity=".3">MOUNIR AMIR</text>
  <!-- Main title -->
  <text x="600" y="138" class="main-title">MOUNIR AMIR</text>

  <!-- Subtitle -->
  <text x="600" y="200" class="sub-title">⚡ FULL STACK DEVELOPER ⚡</text>

  <!-- Tag line -->
  <text x="600" y="258" class="tag-line">[ React · Next.js · Node.js · TypeScript · MySQL · MongoDB ]</text>

  <!-- Bottom status line -->
  <text x="50" y="300" font-family="JetBrains Mono,monospace" font-size="11" fill="#00ffcc" opacity=".5">STATUS: ONLINE</text>
  <rect x="160" y="292" width="7" height="7" rx="7" fill="#00ffcc" opacity=".8">
    <animate attributeName="opacity" values=".8;0;.8" dur="1.5s" repeatCount="indefinite"/>
  </rect>
  <text x="1060" y="300" font-family="JetBrains Mono,monospace" font-size="11" fill="#00ffcc" opacity=".5">ALEXANDRIA · EG 🇪🇬</text>
</svg>
