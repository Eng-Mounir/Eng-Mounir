  <!-- Cursor blink -->
  <rect x="50%" y="18" width="3" height="34" fill="#00FFCC" rx="1">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
  <text x="430" y="35" class="line0">🚀 Full Stack Developer</text>
  <text x="430" y="35" class="line1">⚡ React | Next.js | Node.js | TypeScript</text>
  <text x="430" y="35" class="line2">🔥 From Database to Pixel-Perfect UI</text>
  <text x="430" y="35" class="line3">🌍 Alexandria, Egypt 🇪🇬</text>
  <text x="430" y="35" class="line4">💡 Building Real Products That Matter</text>
  <text x="430" y="35" class="line5">🎯 Always Learning | Always Shipping</text>
  <text x="430" y="35" class="line6">✨ Clean Code | Scalable Architecture</text>
