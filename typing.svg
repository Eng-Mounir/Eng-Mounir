    @keyframes line0 {
      0%, 0.000% { clip-path: inset(0 100% 0 0); opacity: 0; }
      0.010% { opacity: 1; clip-path: inset(0 100% 0 0); }
      4.380% { opacity: 1; clip-path: inset(0 0% 0 0); }
      9.025% { opacity: 1; clip-path: inset(0 0% 0 0); }
      11.214% { opacity: 0; clip-path: inset(0 100% 0 0); }
      100% { opacity: 0; clip-path: inset(0 100% 0 0); }
    }
