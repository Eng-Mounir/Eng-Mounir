      100% { opacity: 0; clip-path: inset(0 100% 0 0); }
    }
    @keyframes line4 {
      0%, 54.114% { clip-path: inset(0 100% 0 0); opacity: 0; }
      54.124% { opacity: 1; clip-path: inset(0 100% 0 0); }
      61.281% { opacity: 1; clip-path: inset(0 0% 0 0); }
