      84.605% { opacity: 0; clip-path: inset(0 100% 0 0); }
      100% { opacity: 0; clip-path: inset(0 100% 0 0); }
    }
    @keyframes line6 {
      0%, 84.605% { clip-path: inset(0 100% 0 0); opacity: 0; }
      84.615% { opacity: 1; clip-path: inset(0 100% 0 0); }
      91.772% { opacity: 1; clip-path: inset(0 0% 0 0); }
