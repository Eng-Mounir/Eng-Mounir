    .line0 { animation: line0 30.14s linear infinite; }
    .line1 { animation: line1 30.14s linear infinite; }
    .line2 { animation: line2 30.14s linear infinite; }
    .line3 { animation: line3 30.14s linear infinite; }
    .line4 { animation: line4 30.14s linear infinite; }
    .line5 { animation: line5 30.14s linear infinite; }
    .line6 { animation: line6 30.14s linear infinite; }
